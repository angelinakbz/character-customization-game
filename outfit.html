<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Outfit Preview</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body{margin:0;background:#fff7f9;font-family:system-ui,Segoe UI,Roboto,Arial}
    .wrap{max-width:900px;margin:24px auto;padding:16px;text-align:center}
    .canvas{position:relative;width:360px;height:540px;margin:12px auto;background:linear-gradient(#fff,#fff);border-radius:12px}
    .char-img{width:100%;height:100%;object-fit:contain;border-radius:12px;position:relative;z-index:1}
    .overlay{position:absolute;pointer-events:none;z-index:2;mix-blend-mode:multiply;opacity:0.95;background:transparent;object-fit:contain}
    .overlay.glasses{left:50%;top:31%;transform:translate(-50%, -50%);width:44%;}
    .overlay.hat{left:50%;top:7%;transform:translateX(-50%);width:58%;}
    .overlay.purse{right:9%;bottom:11%;width:28%;transform:rotate(-6deg);} 
    .overlay.jewellery{left:50%;top:57%;transform:translate(-50%, -50%);width:34%;}
    .meta{margin-top:8px}
    .btn{padding:8px 12px;border-radius:8px;border:none;background:#ff66b2;color:#fff}
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Outfit Preview</h2>
    <div class="meta">Purchase preview — adjust if needed</div>
    <div class="canvas" id="canvas">
      <img id="charImg" class="char-img" src="" alt="character">
    </div>
    <div style="margin-top:12px"><button id="back" class="btn">View your character</button></div>
  </div>
<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const idxParam = params.get('purchase') || params.get('idx');
  const purchases = JSON.parse(localStorage.getItem('purchases')||'[]');
  const normalizedPurchases = (Array.isArray(purchases) ? purchases : []).filter(Boolean);
  const validPurchases = normalizedPurchases
    .map((p, i) => ({ purchase: p, index: i }))
    .filter(({ purchase }) => purchase && Array.isArray(purchase.items) && purchase.items.length > 0)
    .sort((a, b) => (Number(b.purchase.time) || 0) - (Number(a.purchase.time) || 0));

  function sanitizePurchase(p){
    return {
      time: Number(p.time) || Date.now(),
      total: Number(p.total) || 0,
      items: Array.isArray(p.items) ? p.items.filter(it => it && it.filename && String(it.filename).trim() !== '' && String(it.filename) !== 'undefined').map(it => ({ ...it, filename: String(it.filename) })) : [],
      char: p.char || '',
      pet: p.pet || '',
      house: p.house || ''
    };
  }

  function getOverlayClassName(type){
    const normalized = String(type || '').toLowerCase().trim();
    if (normalized.includes('glass')) return 'glasses';
    if (normalized.includes('hat')) return 'hat';
    if (normalized.includes('jewel') || normalized.includes('neck')) return 'jewellery';
    if (normalized.includes('purse') || normalized.includes('bag')) return 'purse';
    return normalized || 'item';
  }

  let idx = Number(idxParam);
  let purchase = null;
  const viewTime = Number(localStorage.getItem('viewPurchaseTime') || '0') || 0;
  if (viewTime && validPurchases.length){
    const matching = validPurchases.find(({ purchase }) => Number(purchase.time) === viewTime);
    if (matching){ purchase = matching.purchase; idx = matching.index; }
  }
  if (!purchase && validPurchases.length){
    const latest = validPurchases[0];
    purchase = latest.purchase; idx = latest.index;
  }

  const charImg = document.getElementById('charImg');
  const canvas = document.getElementById('canvas');
  let selectedCharacter = '';
  try{ selectedCharacter = localStorage.getItem('selectedCharacter') || ''; }catch(e){}
  let selectedOutfit = null;
  try{ selectedOutfit = JSON.parse(localStorage.getItem('selectedOutfit') || '{}'); }catch(e){ selectedOutfit = null; }

  if (!purchase){
    canvas.innerHTML = '<div style="padding:24px;color:#666">No accessory purchase data available. <br><br><button id="go-purchases" class="btn">Go to Purchases</button></div>';
    const btn = document.getElementById('go-purchases'); if (btn) btn.addEventListener('click', ()=> window.location.href='purchases.html');
    return;
  }
  purchase = sanitizePurchase(purchase); 
  try{ localStorage.setItem('purchases', JSON.stringify([purchase])); }catch(e){}

  function trySetCharacterImage(src){
    if (!src) { charImg.src=''; charImg.style.background='#fff'; return; }
    charImg.style.display = 'block';
    charImg.onerror = function(){
      try{ const alt = decodeURIComponent(src); if (alt !== src){ charImg.onerror=null; charImg.src = alt; return; } }catch(e){}
      try{ const alt2 = decodeURI(src); if (alt2 !== src){ charImg.onerror=null; charImg.src = alt2; return; } }catch(e){}
      try{ const alt3 = src.replace(/%20/g,' '); if (alt3 !== src){ charImg.onerror=null; charImg.src = alt3; return; } }catch(e){}
      charImg.style.display = 'none';
    };
    charImg.src = src;
  }

  // show char or placeholder
  const characterSource = (selectedOutfit && selectedOutfit.char) ? selectedOutfit.char : (purchase.char || selectedCharacter || '');
  if (characterSource){ trySetCharacterImage(characterSource); } else { charImg.src = ''; charImg.style.background='#fff'; }

  // add accessory overlays
  (purchase.items||[]).forEach(it=>{
    const img = document.createElement('img'); img.alt = it.type || '';
    img.className = 'overlay ' + getOverlayClassName(it.type || '');
    // process image to remove white background before appending
    processImageToTrimWhite(it.filename || '', function(dataUrl){ img.src = dataUrl; canvas.appendChild(img); });
  });

  // helper to strip near-white backgrounds and return PNG dataURL
  function processImageToTrimWhite(src, cb){
    try{
      const img = new Image();
      img.onload = function(){
        const w = img.naturalWidth || img.width;
        const h = img.naturalHeight || img.height;
        const c = document.createElement('canvas'); c.width = w; c.height = h;
        const ctx = c.getContext('2d'); ctx.drawImage(img,0,0,w,h);
        try{
          const id = ctx.getImageData(0,0,w,h);
          const data = id.data;
          for (let i=0;i<data.length;i+=4){ const r = data[i], g = data[i+1], b = data[i+2]; if (r>240 && g>240 && b>240) data[i+3]=0; }
          ctx.putImageData(id,0,0);
          cb(c.toDataURL('image/png'));
        }catch(e){ cb(src); }
      };
      img.onerror = function(){ cb(src); };
      img.src = src;
    }catch(e){ cb(src); }
  }

  document.getElementById('back').addEventListener('click', ()=>{
    try{
      // save the current purchase as selected outfit so character page can auto-apply it
      if (purchase){
        localStorage.setItem('selectedOutfit', JSON.stringify({ items: purchase.items||[], char: purchase.char||'', pet: purchase.pet||'', time: purchase.time||Date.now() }));
        if (purchase.char) localStorage.setItem('selectedCharacter', purchase.char);
        if (purchase.pet) localStorage.setItem('selectedPet', purchase.pet);
      }
    }catch(e){}
    window.location.href='character.html';
  });
})();
</script>
<script src="reload-redirect.js"></script>
</body>
</html>
